<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陪玩</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="header-left">
        <span class="title">陪玩</span>
        <nav class="header-nav" aria-label="快捷入口">
          <a href="/probe" class="header-nav-link" title="E2E 链路探针">探针</a>
          <a href="?mode=observer" id="link-observer" class="header-nav-link" title="只读旁观">旁观</a>
        </nav>
      </div>
      <div id="status-bar">
        <span class="dot" id="dot-nitrogen" title="NitroGen 推理状态">NitroGen</span>
        <span class="dot" id="dot-vlm"      title="VLM 处理状态">VLM</span>
        <span id="tts-status">🔇 待机</span>
        <span id="mic-status">🎤 未连接</span>
      </div>
    </header>

    <main id="main">

      <section id="video-section">
        <div id="video-upload-area" class="upload-area">
          <p>选择本地游戏视频文件</p>
          <input type="file" id="file-input" accept="video/*" />
          <label for="file-input" class="btn">选择视频</label>
          <p class="hint">支持 MP4、AVI、MKV 等格式</p>
        </div>

        <div id="video-player-area" style="display:none">
          <p id="prepare-status" class="prepare-status" hidden></p>
          <video id="video-player" controls playsinline></video>
          <label class="video-audio-toggle">
            <input type="checkbox" id="chk-video-audio" />
            开启游戏原声（关闭可改善麦克风收音）
          </label>
          <div id="video-controls">
            <button id="btn-start-analysis" class="btn btn-primary">▶ 开始分析</button>
            <button id="btn-stop-analysis"  class="btn btn-danger"   style="display:none">■ 停止</button>
          </div>
        </div>
      </section>

      <section id="chat-section">
        <div id="chat-header">
          <span>💬 对话记录</span>
          <button id="btn-clear-chat" class="btn-small">清空</button>
        </div>
        <div id="chat-messages">
          <div class="chat-placeholder">分析开始后，AI 提示和你的问题会显示在这里</div>
        </div>
      </section>

    </main>

    <details id="debug-panel">
      <summary>🔧 NitroGen 实时感知信号</summary>
      <div id="debug-content">
        <div class="debug-row">
          <span class="label">主导意图</span>
          <span id="dbg-intent">—</span>
          <span class="label">置信度</span>
          <span id="dbg-conf">—</span>
          <span class="label">方向</span>
          <span id="dbg-dir">—</span>
        </div>
        <div class="debug-row">
          <span class="label">摇杆 X</span>
          <span id="dbg-steer">—</span>
          <span class="label">右扳机</span>
          <span id="dbg-throttle">—</span>
          <span class="label">左扳机</span>
          <span id="dbg-brake">—</span>
        </div>
        <div class="debug-row">
          <span class="label">动作摘要</span>
          <span id="dbg-hint">—</span>
        </div>
        <div class="debug-row">
          <span class="label">预测序列</span>
          <span id="dbg-horizon">—</span>
        </div>
        <div class="debug-row">
          <span class="label">视频时间</span>
          <span id="dbg-time">—</span>
        </div>
      </div>
    </details>

  </div>

  <!-- Fix 11：隐藏的帧捕获 canvas，256×256 与 NitroGen 输入尺寸一致 -->
  <canvas id="capture-canvas" width="256" height="256" style="display:none"></canvas>

  <script src="/static/app.js?v=20250625-live"></script>
</body>
</html>
